{% load static %}<html><head><title>The Blog</title><link rel='stylesheet' href='{% static "app/style.css" %}'></head><body><nav><a href='/'>The Blog</a><div>{% if request.user.is_authenticated %}<span style='color:#aaa;margin-right:1rem;'>Hi, {{ request.user.username }}!</span><a href='/logout/' class='btn' style='background:#333;color:#fff;margin-right:0.5rem;'>Logout</a><a href='/post/create/' class='btn'>+ New Post</a>{% else %}<a href='/login/' class='btn' style='background:#333;color:#fff;margin-right:0.5rem;'>Login</a><a href='/signup/' class='btn'>Sign Up</a>{% endif %}</div></nav><div class='container'><h1>Latest Posts</h1><form method=GET action=/search/ class="search-form"><input type=text name=q placeholder=Search...><button type=submit>Search</button></form>{% for post in posts %}<div class='post-card'><h2><a href='/post/{{ post.pk }}/'>{{ post.title }}</a></h2><p>{{ post.content }}</p><small>{{ post.created_at }}</small></div>{% empty %}<p class='empty'>No posts yet!</p>{% endfor %}</div></body></html>
